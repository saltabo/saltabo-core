# Publishes updates to the org/user GitHub Pages repo (e.g. saltabo/saltabo.github.io):
# 1) Build Saltabo.app, zip with ditto
# 2) Create/find GitHub Release for the tag and upload Saltabo.zip to the public distribution repo
# 3) Run Sparkle generate_appcast (signed with EdDSA)
# 4) Push appcast.xml to the Pages repo (https://<owner>.github.io/appcast.xml)
#
# Required repository secrets:
#   SPARKLE_EDDSA_PRIVATE_KEY — contents of the private key file from Sparkle's generate_keys
#   PAGES_DEPLOY_TOKEN        — fine-grained PAT with Contents: Read and write on <owner>/<owner>.github.io
#   BUILD_CERTIFICATE_BASE64  — base64 of Developer ID Application .p12 certificate
#   P12_PASSWORD              — password for the .p12 certificate
#   APPLE_API_KEY_ID          — App Store Connect API key ID
#   APPLE_API_ISSUER_ID       — App Store Connect API issuer ID
#   APPLE_API_PRIVATE_KEY     — contents of AuthKey_<APPLE_API_KEY_ID>.p8
#
# Required repository variables:
#   APPLE_TEAM_ID             — Apple Developer Team ID (for code signing + notarization)
#
# To use a Pages repo that is not `<owner>/<owner>.github.io`, edit env PAGES_REPOSITORY below.

name: Publish release to Pages

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-pages-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  SPARKLE_VERSION: "2.9.1"
  PRODUCT_NAME: Saltabo
  # Base URL for Saltabo API used by release builds.
  SALTABO_API_BASE_URL: ${{ vars.SALTABO_API_BASE_URL }}
  # Public site repo: https://<owner>.github.io/appcast.xml — e.g. saltabo/saltabo.github.io
  PAGES_REPOSITORY: ${{ format('{0}/{0}.github.io', github.repository_owner) }}
  # Release assets are uploaded to this repository and referenced by appcast.
  DIST_REPOSITORY: ${{ format('{0}/{0}.github.io', github.repository_owner) }}

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Import Developer ID certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "${BUILD_CERTIFICATE_BASE64:-}" || { echo "Missing secret BUILD_CERTIFICATE_BASE64"; exit 1; }
          test -n "${P12_PASSWORD:-}" || { echo "Missing secret P12_PASSWORD"; exit 1; }

          CERT_PATH="${{ runner.temp }}/build_certificate.p12"
          KEYCHAIN_PATH="${{ runner.temp }}/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          printf '%s' "$BUILD_CERTIFICATE_BASE64" | python3 -c 'import base64,sys; sys.stdout.buffer.write(base64.b64decode(sys.stdin.read()))' > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build Release
        env:
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          test -n "${APPLE_TEAM_ID:-}" || { echo "Missing variable APPLE_TEAM_ID"; exit 1; }
          xcodebuild \
            -project "${PRODUCT_NAME}.xcodeproj" \
            -scheme "${PRODUCT_NAME}" \
            -configuration Release \
            -derivedDataPath "${{ runner.temp }}/dd" \
            -destination "generic/platform=macOS" \
            SALTABO_API_BASE_URL="${SALTABO_API_BASE_URL}" \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            build

      - name: Create archive (zip for notarization)
        id: zip
        run: |
          set -euo pipefail
          APP="${{ runner.temp }}/dd/Build/Products/Release/${PRODUCT_NAME}.app"
          test -d "$APP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "${PRODUCT_NAME}.zip"
          ls -la "${PRODUCT_NAME}.zip"

      - name: Notarize archive
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "${APPLE_API_KEY_ID:-}" || { echo "Missing secret APPLE_API_KEY_ID"; exit 1; }
          test -n "${APPLE_API_ISSUER_ID:-}" || { echo "Missing secret APPLE_API_ISSUER_ID"; exit 1; }
          test -n "${APPLE_API_PRIVATE_KEY:-}" || { echo "Missing secret APPLE_API_PRIVATE_KEY"; exit 1; }
          KEY_PATH="${{ runner.temp }}/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s\n' "${APPLE_API_PRIVATE_KEY}" > "${KEY_PATH}"
          chmod 600 "${KEY_PATH}"
          xcrun notarytool submit "${PRODUCT_NAME}.zip" \
            --key "${KEY_PATH}" \
            --key-id "${APPLE_API_KEY_ID}" \
            --issuer "${APPLE_API_ISSUER_ID}" \
            --wait

      - name: Staple notarization ticket
        run: |
          set -euo pipefail
          APP="${{ runner.temp }}/dd/Build/Products/Release/${PRODUCT_NAME}.app"
          xcrun stapler staple "$APP"
          spctl -a -t exec -vv "$APP"

      - name: Recreate distributable archive (zip)
        run: |
          set -euo pipefail
          APP="${{ runner.temp }}/dd/Build/Products/Release/${PRODUCT_NAME}.app"
          rm -f "${PRODUCT_NAME}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "${PRODUCT_NAME}.zip"
          ls -la "${PRODUCT_NAME}.zip"

      - name: Create or update release in distribution repo
        env:
          TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          DIST_REPOSITORY: ${{ env.DIST_REPOSITORY }}
        run: |
          set -euo pipefail
          test -n "${TOKEN:-}" || { echo "Missing secret PAGES_DEPLOY_TOKEN"; exit 1; }
          CLEAN_TOKEN="$(printf '%s' "$TOKEN" | tr -d '\r\n[:space:]')"
          test -n "${CLEAN_TOKEN:-}" || { echo "PAGES_DEPLOY_TOKEN is empty after trimming whitespace"; exit 1; }

          if GH_TOKEN="${CLEAN_TOKEN}" gh release view "${{ github.ref_name }}" --repo "${DIST_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists in ${DIST_REPOSITORY}."
          else
            GH_TOKEN="${CLEAN_TOKEN}" gh release create "${{ github.ref_name }}" \
              --repo "${DIST_REPOSITORY}" \
              --title "${{ github.ref_name }}" \
              --generate-notes
          fi

          GH_TOKEN="${CLEAN_TOKEN}" gh release upload "${{ github.ref_name }}" "${PRODUCT_NAME}.zip" \
            --clobber \
            --repo "${DIST_REPOSITORY}"

      - name: Install Sparkle generate_appcast
        run: |
          set -euo pipefail
          curl -fsSL -o sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p sparkle-tools
          tar -xf sparkle.tar.xz -C sparkle-tools
          echo "SPARKLE_BIN=${{ github.workspace }}/sparkle-tools/bin/generate_appcast" >> "$GITHUB_ENV"

      - name: Write Sparkle private key
        env:
          KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "${KEY:-}" || { echo "Missing secret SPARKLE_EDDSA_PRIVATE_KEY"; exit 1; }
          printf '%s\n' "$KEY" > "${{ runner.temp }}/sparkle_eddsa.key"
          chmod 600 "${{ runner.temp }}/sparkle_eddsa.key"

      - name: Generate appcast.xml
        env:
          SPARKLE_EDDSA_KEY_FILE: ${{ runner.temp }}/sparkle_eddsa.key
          DIST_REPOSITORY: ${{ env.DIST_REPOSITORY }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          export GITHUB_OWNER="${DIST_REPOSITORY%%/*}"
          export GITHUB_REPO="${DIST_REPOSITORY#*/}"
          chmod +x ./scripts/generate-appcast.sh
          ./scripts/generate-appcast.sh "${PRODUCT_NAME}.zip" -o appcast.xml

      - name: Push appcast to Pages repository
        env:
          TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          PAGES_REPOSITORY: ${{ env.PAGES_REPOSITORY }}
        run: |
          set -euo pipefail
          test -n "${TOKEN:-}" || { echo "Missing secret PAGES_DEPLOY_TOKEN"; exit 1; }

          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/${PAGES_REPOSITORY}.git" pages-repo
          cp -f appcast.xml pages-repo/appcast.xml
          cd pages-repo
          git add appcast.xml
          if git diff --staged --quiet; then
            echo "No appcast changes."
          else
            git commit -m "appcast: ${{ github.repository }} ${{ github.ref_name }}"
            DEFAULT_BRANCH="$(GH_TOKEN="${TOKEN}" gh api "repos/${PAGES_REPOSITORY}" --jq .default_branch)"
            git push "https://x-access-token:${TOKEN}@github.com/${PAGES_REPOSITORY}.git" "HEAD:refs/heads/${DEFAULT_BRANCH}"
          fi
